<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELAR // Sistema Académico</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;700&family=Montserrat:wght@200;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-pure: #000000;
            --bg-obsidian: rgba(10, 10, 10, 0.75);
            --border-line: rgba(187, 161, 115, 0.15);
            --border-line-active: rgba(187, 161, 115, 0.4);
            --text-titanium: #f5f5f7;
            --text-bronze: #bba173;
            --text-muted: #6e6e73;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-pure);
            color: var(--text-titanium);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Barra de navegación flotante con efecto cristal esmerilado */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 25px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-line);
            animation: navReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--text-titanium);
            text-decoration: none;
            font-weight: 500;
        }

        .logo span {
            color: var(--text-bronze);
        }

        nav {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: color 0.4s ease;
        }

        nav a:hover {
            color: var(--text-titanium);
        }

        .btn-nav-action {
            border: 1px solid var(--text-bronze);
            padding: 10px 24px;
            color: var(--text-bronze);
            background: transparent;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-nav-action:hover {
            background-color: var(--text-bronze);
            color: var(--bg-pure);
            box-shadow: 0 0 25px rgba(187, 161, 115, 0.2);
            transform: translateY(-1px);
        }

        .main-content {
            margin-top: 95px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        footer {
            padding: 35px;
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            border-top: 1px solid var(--border-line);
            background: #030303;
        }

        /* Animación global para la barra de navegación */
        @keyframes navReveal {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <a href="/" class="logo">VELAR<span>.</span></a>
        <nav>
            <a href="/">Inicio</a>
            <a href="/registro">Registro</a>
            <a href="/registro#seccion-consulta" class="btn-nav-action">Consulta directa</a>
        </nav>
    </header>

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <footer>
        © 2026 VELAR STUDIO — TODOS LOS DERECHOS RESERVADOS.
    </footer>

</body>
</html>
