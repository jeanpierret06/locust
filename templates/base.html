<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELAR // Next-Gen Academic</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #0b0f19;
            --bg-card: rgba(20, 32, 54, 0.45);
            --neon-cyan: #00f2fe;
            --neon-blue: #4facfe;
            --text-pure: #ffffff;
            --text-silver: #94a3b8;
            --glass-border: rgba(0, 242, 254, 0.15);
            --glass-border-active: rgba(0, 242, 254, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-pure);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- SISTEMA PRELOADER --- */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-deep);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.6s;
        }

        .loader-ring {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(0, 242, 254, 0.1);
            border-radius: 50%;
            border-top-color: var(--neon-cyan);
            border-bottom-color: var(--neon-blue);
            animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }

        .loader-text {
            margin-top: 20px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 4px;
            color: var(--neon-cyan);
            text-transform: uppercase;
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* --- NAVEGACIÓN FUTURISTA --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 20px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(11, 15, 25, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-pure);
            text-decoration: none;
            font-weight: 700;
        }

        .logo span {
            color: var(--neon-cyan);
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.6);
        }

        nav {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        nav a {
            color: var(--text-silver);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: var(--neon-cyan);
        }

        .btn-nav-tech {
            border: 1px solid var(--neon-cyan);
            padding: 10px 24px;
            color: var(--neon-cyan);
            background: rgba(0, 242, 254, 0.03);
            border-radius: 4px;
            font-family: 'Space Grotesk', sans-serif;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.05);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-nav-tech:hover {
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-cyan));
            color: var(--bg-deep);
            border-color: transparent;
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.3);
            transform: translateY(-1px);
        }

        .main-content {
            margin-top: 85px;
            flex: 1;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Cuando el loader termina, activa la visualización */
        body.loaded .main-content {
            opacity: 1;
            transform: translateY(0);
        }

        footer {
            padding: 30px;
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-silver);
            letter-spacing: 2px;
            border-top: 1px solid var(--glass-border);
            background: #070a10;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="loader-ring"></div>
        <div class="loader-text">Sincronizando Sistema</div>
    </div>

    <header>
        <a href="/" class="logo">COMPU<span>EDU</span></a>
        <nav>
            <a href="/">Dashboard</a>
            <a href="/registro">Inscripciones</a>
            <a href="/registro#seccion-consulta" class="btn-nav-tech">Ver Registros</a>
        </nav>
    </header>

    <div class="main-content">
        {% block content %}{% endblock %}
    </div>

    <footer>
        // QUANTUM CORE INTERFACE — COMPUEDU ACADEMIC GRAPH 2026.
    </footer>

    <script>
        // Lógica de apagado del Preloader al terminar de cargar los recursos activos
        window.addEventListener('load', function() {
            const preloader = document.getElementById('preloader');
            preloader.style.opacity = '0';
            preloader.style.visibility = 'hidden';
            document.body.classList.add('loaded');
        });
    </script>
</body>
</html>
