{% extends 'base.html' %}
{% block content %}
<style>
    .hero-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 40px 20px;
        min-height: calc(100vh - 160px);
    }

    .glass-reveal-box {
        background: rgba(11, 19, 36, 0.4);
        border: 1px solid var(--glass-border);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        padding: 50px 70px;
        border-radius: 8px;
        box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        max-width: 850px;
    }

    .hero-title {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 3.5rem;
        font-weight: 700;
        letter-spacing: -0.5px;
        line-height: 1.1;
        background: linear-gradient(135deg, #ffffff 40%, var(--neon-cyan));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 25px;
    }

    .hero-subtitle {
        font-size: 1rem;
        color: var(--text-silver);
        line-height: 1.8;
        font-weight: 300;
        margin-bottom: 40px;
        letter-spacing: 0.5px;
    }

    .btn-group {
        display: flex;
        gap: 20px;
        justify-content: center;
    }

    .btn-cyber {
        padding: 16px 36px;
        font-family: 'Space Grotesk', sans-serif;
        font-size: 0.8rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2px;
        text-decoration: none;
        border-radius: 4px;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .btn-cyan {
        background: linear-gradient(135deg, var(--neon-blue), var(--neon-cyan));
        color: #05070f;
        box-shadow: 0 10px 30px rgba(0, 242, 254, 0.25);
    }

    .btn-cyan:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 35px rgba(0, 242, 254, 0.45);
    }

    .btn-outline {
        border: 1px solid var(--glass-border);
        color: #fff;
    }

    .btn-outline:hover {
        border-color: var(--neon-cyan);
        color: var(--neon-cyan);
        transform: translateY(-3px);
    }
</style>

<div class="hero-container">
    <div class="glass-reveal-box">
        <h1 class="hero-title">Módulo Académico Inteligente</h1>
        <p class="hero-subtitle">Transición fluida multi-capa con persistencia asíncrona sobre PostgreSQL. Diseñado para operaciones de baja latencia y alta fidelidad visual.</p>
        
        <div class="btn-group">
            <a href="/registro" id="nav-registro" class="btn-cyber btn-cyan">Módulo Escritura</a>
            <a href="/registro#seccion-consulta" id="nav-consulta" class="btn-cyber btn-outline">Sección Registros</a>
        </div>
    </div>
</div>

<script>
    document.getElementById('nav-registro').setAttribute('href', '/registro');
</script>
{% endblock %}
