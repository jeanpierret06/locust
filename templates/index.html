{% extends 'base.html' %}
{% block content %}
<style>
    .hero-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 60px 20px;
        background: radial-gradient(circle at 50% 30%, rgba(0, 242, 254, 0.04) 0%, rgba(11, 15, 25, 0) 70%);
        min-height: calc(100vh - 150px);
    }

    .badge-tech {
        background: rgba(0, 242, 254, 0.08);
        border: 1px solid var(--glass-border);
        color: var(--neon-cyan);
        padding: 6px 16px;
        font-size: 0.7rem;
        font-family: 'Space Grotesk', sans-serif;
        text-transform: uppercase;
        letter-spacing: 3px;
        border-radius: 100px;
        margin-bottom: 30px;
        box-shadow: 0 0 20px rgba(0, 242, 254, 0.05);
    }

    .hero-title {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 4rem;
        font-weight: 700;
        letter-spacing: -1px;
        line-height: 1.1;
        max-width: 850px;
        background: linear-gradient(135deg, var(--text-pure) 30%, var(--text-silver));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 30px;
    }

    .hero-subtitle {
        font-size: 1.05rem;
        color: var(--text-silver);
        max-width: 600px;
        line-height: 1.8;
        font-weight: 400;
        margin-bottom: 50px;
    }

    .btn-group {
        display: flex;
        gap: 20px;
    }

    .btn-cyber {
        padding: 16px 36px;
        font-family: 'Space Grotesk', sans-serif;
        font-size: 0.8rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 2px;
        text-decoration: none;
        border-radius: 4px;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .btn-primary-cyan {
        background: linear-gradient(135deg, var(--neon-blue), var(--neon-cyan));
        color: var(--bg-deep);
        box-shadow: 0 10px 30px rgba(0, 242, 254, 0.2);
    }

    .btn-primary-cyan:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 35px rgba(0, 242, 254, 0.35);
    }

    .btn-secondary-outline {
        border: 1px solid var(--glass-border);
        color: var(--text-pure);
        background: rgba(255,255,255,0.02);
    }

    .btn-secondary-outline:hover {
        border-color: var(--neon-cyan);
        color: var(--neon-cyan);
        transform: translateY(-3px);
    }
</style>

<div class="hero-container">
    <div class="badge-tech">v2.0 Sincronizada</div>
    <h1 class="hero-title">Gestión de Datos Escalable & Fluida</h1>
    <p class="hero-subtitle">Procesamiento distribuido y visualización asíncrona sobre una arquitectura limpia de baja latencia. Diseñado para control en tiempo real.</p>
    
    <div class="btn-group">
        <a href="/registro" id="nav-registro" class="btn-cyber btn-primary-cyan">Módulo Escritura</a>
        <a href="/registro#seccion-consulta" id="nav-consulta" class="btn-cyber btn-secondary-outline">Panel Consulta</a>
    </div>
</div>

<script>
    document.getElementById('nav-registro').setAttribute('href', '/registro');
</script>
{% endblock %}
